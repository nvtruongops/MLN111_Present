version: "3.9"

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/your-org/mln111-present:latest}
    container_name: mln111-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - challenge_data:/app/data
    networks:
      - web

  caddy:
    image: caddy:2.8-alpine
    container_name: mln111-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  challenge_data:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
